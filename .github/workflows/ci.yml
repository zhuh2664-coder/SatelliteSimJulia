name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: '1.12'

      - name: Cache Julia artifacts
        uses: julia-actions/cache@v2

      - name: Install headless OpenGL support
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libgl1-mesa-dri libegl1 mesa-utils

      - name: Instantiate
        run: julia --project=. -e 'using Pkg; Pkg.instantiate()'

      - name: Test
        run: xvfb-run -s "-screen 0 1024x768x24" julia --project=. -e 'using Pkg; Pkg.test()'
