name: CI

on:
  push:
    branches: [main, "cursor/**"]
  pull_request:
    branches: [main]

jobs:
  boundary:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: "1.12"
      - name: Dependency boundary check
        run: julia scripts/check_dependency_boundaries.jl

  core-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: "1.12"
      - uses: julia-actions/cache@v2
      - name: Instantiate envs/core
        run: julia --project=envs/core -e 'using Pkg; Pkg.instantiate()'
      - name: Core smoke
        run: julia --project=envs/core test/runtests_core_smoke.jl

  sim-test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [boundary, core-test]
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: "1.12"
      - uses: julia-actions/cache@v2
      - name: Instantiate root (sim)
        run: julia --project=. -e 'using Pkg; Pkg.instantiate()'
      - name: Run bootstrap test suite
        run: julia --project=. test/runtests.jl
      - name: Run current regression suite
        env:
          SATSIM_RUN_CURRENT: "1"
        run: julia --project=. test/runtests.jl
      - name: Integration test
        run: |
          julia --project=src/lab -e 'using Pkg; Pkg.instantiate()'
          julia --project=. scripts/integration_test.jl

  manifest-baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: sim-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: "1.12"
      - uses: julia-actions/cache@v2
      - name: Instantiate tracked environments
        run: |
          julia --project=. -e 'using Pkg; Pkg.instantiate()'
          julia --project=envs/core -e 'using Pkg; Pkg.instantiate()'
          julia --project=envs/sim -e 'using Pkg; Pkg.instantiate()'
      - name: Manifest baseline check
        run: julia scripts/check_manifest_baseline.jl
