name: Nightly Validation

on:
  schedule:
    - cron: "23 7 * * *"
  workflow_dispatch:

jobs:
  full-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: "1.12"
      - uses: julia-actions/cache@v2
      - name: Root regression suite
        env:
          SATSIM_RUN_CURRENT: "1"
        run: |
          julia --project=. -e 'using Pkg; Pkg.instantiate()'
          julia --project=. test/runtests.jl
      - name: JuliaSpace backend adapter
        run: julia --project=packages/SatelliteSimJuliaSpaceBackend -e 'using Pkg; Pkg.instantiate(); Pkg.test()'
      - name: Three-backend end-to-end contract
        run: |
          julia --project=envs/backends-integration -e 'using Pkg; Pkg.instantiate()'
          julia --project=envs/backends-integration test/backends/test_backend_end_to_end.jl
      - name: Orbit backend performance baseline smoke
        run: julia --project=envs/backends-integration scripts/benchmark_orbit_backends.jl --smoke
