</svg></div></div><script>
let scale=.145,tx=18,ty=14;const canvas=document.getElementById('canvas'),stage=document.getElementById('stage'),z=document.getElementById('z');function apply(){canvas.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`;z.textContent=Math.round(scale*100)+'%'}function zoomBy(f,cx=innerWidth/2,cy=innerHeight/2){const old=scale;scale=Math.max(.045,Math.min(2.8,scale*f));tx=cx-(cx-tx)*(scale/old);ty=cy-(cy-ty)*(scale/old);apply()}function resetView(){scale=.145;tx=18;ty=14;apply()}function fitAll(){scale=Math.min(innerWidth/8000,innerHeight/5200)*.94;tx=(innerWidth-8000*scale)/2;ty=(innerHeight-5200*scale)/2;apply()}function toggleDetails(){canvas.classList.toggle('dim-details',!document.getElementById('detail').checked)}function toggleBoundary(){canvas.classList.toggle('hide-boundary',!document.getElementById('boundary').checked)}let dragging=false,sx=0,sy=0,stx=0,sty=0;stage.addEventListener('mousedown',e=>{dragging=true;sx=e.clientX;sy=e.clientY;stx=tx;sty=ty;stage.style.cursor='grabbing'});window.addEventListener('mouseup',()=>{dragging=false;stage.style.cursor='grab'});window.addEventListener('mousemove',e=>{if(!dragging)return;tx=stx+e.clientX-sx;ty=sty+e.clientY-sy;apply()});stage.addEventListener('wheel',e=>{e.preventDefault();zoomBy(e.deltaY<0?1.12:.89,e.clientX,e.clientY)},{passive:false});apply();
</script></body></html>
