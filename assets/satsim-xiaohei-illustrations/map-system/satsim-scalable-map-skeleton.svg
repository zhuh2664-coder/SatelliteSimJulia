<defs>
<style>
  :root { --ink:#1d1d1f; --orange:#eb7619; --blue:#2f6fd6; --red:#d94a3a; --paper:#fff; --soft:#f3f3f3; }
  text { font-family: "Hiragino Sans GB", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: var(--ink); }
  .module { fill: rgba(255,255,255,.82); stroke: #1d1d1f; stroke-width: 5; stroke-linejoin: round; }
  .module.level0 { stroke-width: 6; }
  .module.level2 { stroke-dasharray: 18 12; }
  .title { font-size: 86px; font-weight: 700; }
  .sub { font-size: 42px; fill:#555; }
  .micro { font-size: 30px; fill:#666; }
  .label { font-size: 48px; font-weight: 600; }
  .boundary { stroke:#dadada; stroke-width:3; stroke-dasharray: 18 22; fill:none; opacity:.75; }
  .tile-label { font-size:28px; fill:#9a9a9a; }
  .path-main { fill:none; stroke: var(--orange); stroke-width: 22; stroke-linecap:round; stroke-linejoin:round; }
  .path-shadow { fill:none; stroke: #f7d7bd; stroke-width: 42; stroke-linecap:round; stroke-linejoin:round; opacity:.7; }
  .backflow { fill:none; stroke: var(--blue); stroke-width: 12; stroke-linecap:round; stroke-dasharray: 28 18; }
  .anchor { fill: var(--red); stroke:#fff; stroke-width:5; }
  .asset-slot { fill:#fafafa; stroke:#cfcfcf; stroke-width:3; stroke-dasharray:10 10; }
  .slot-text { font-size:24px; fill:#777; }
  .legend { font-size:34px; fill:#333; }
  .faint { opacity:.55; }
</style>
