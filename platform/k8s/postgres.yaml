apiVersion: v1
kind: Secret
metadata:
  name: satnet-db
  namespace: satnet
type: Opaque
stringData:
  url: "postgresql://postgres:postgres@postgres.satnet:5432/satnet"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: satnet
spec:
  replicas: 1
  selector:
    matchLabels: {app: postgres}
  template:
    metadata:
      labels: {app: postgres}
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        env:
        - name: POSTGRES_DB
          value: satnet
        - name: POSTGRES_PASSWORD
          value: postgres
        ports:
        - containerPort: 5432
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: satnet
spec:
  selector: {app: postgres}
  ports:
  - port: 5432
    targetPort: 5432
