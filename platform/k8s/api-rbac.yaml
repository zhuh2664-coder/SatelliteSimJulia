apiVersion: v1
kind: ServiceAccount
metadata:
  name: satnet-api
  namespace: satnet
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: satnet-api-role
  namespace: satnet
rules:
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["create", "get", "list", "watch", "delete"]
- apiGroups: [""]
  resources: ["pods", "pods/log"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: satnet-api-binding
  namespace: satnet
subjects:
- kind: ServiceAccount
  name: satnet-api
roleRef:
  kind: Role
  name: satnet-api-role
  apiGroup: rbac.authorization.k8s.io
